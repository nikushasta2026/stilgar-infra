version: '3.9'

# =============================================================================
# Stilgar Infrastructure — Full Stack Docker Compose
# =============================================================================
# Services:
#   - paperclip:    AI Company OS (port 3100)
#   - nanoclaw-ceo: OpenClaw CEO agent node (port 3000)
#   - hermes:       NousResearch Hermes Agent (port 8080)
#   - twenty-crm:   Twenty CRM (port 3200) — developer outreach CRM
#   - twenty-db:    PostgreSQL for Twenty CRM
#   - twenty-redis: Redis for Twenty CRM
#
# Managed by Coolify on the Stilgar dedicated server (61GB RAM).
# Note: No custom network defined — Coolify manages its own bridge network.
#
# Usage (standalone):
#   cp .env.example .env && nano .env
#   docker compose up -d
# =============================================================================

volumes:
  paperclip-data:
    name: paperclip-data
  nanoclaw-ceo-data:
    name: nanoclaw-ceo-data
  hermes-data:
    name: hermes-data
  twenty-db-data:
    name: twenty-db-data
  twenty-server-local-data:
    name: twenty-server-local-data
  twenty-redis-data:
    name: twenty-redis-data

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — Persistent database for Paperclip
  # ---------------------------------------------------------------------------


  # ---------------------------------------------------------------------------
  # Paperclip — AI Company OS
  # ---------------------------------------------------------------------------
  paperclip:
    build:
      context: ./paperclip
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/nikushasta2026}/paperclip:${TAG:-latest}
    container_name: paperclip
    restart: unless-stopped
    ports:
      - "3101:3101"
    volumes:
      - paperclip-data:/paperclip
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_BASE_URL=${BETTER_AUTH_BASE_URL:-http://77.42.7.12:3100}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PAPERCLIP_HOME=/paperclip
      - HOST=0.0.0.0
      - PORT=3101
      - SERVE_UI=true
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3101/api/health || wget -qO- http://localhost:3101/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # NanoClaw CEO — OpenClaw Nanoclaw Node (CEO Persona)
  # ---------------------------------------------------------------------------
  nanoclaw-ceo:
    build:
      context: ./nanoclaw-ceo
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/nikushasta2026}/nanoclaw-ceo:${TAG:-latest}
    container_name: nanoclaw-ceo
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - nanoclaw-ceo-data:/agent/workspace
    environment:
      - OPENCLAW_AGENT_TOKEN=${NANOCLAW_CEO_TOKEN}
      - PAPERCLIP_GATEWAY_URL=http://paperclip:3100
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_BOARD_CHANNEL=${SLACK_BOARD_CHANNEL:-}
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Hermes Agent — NousResearch Hermes (hermes-local adapter testing)
  # ---------------------------------------------------------------------------
  hermes:
    build:
      context: ./hermes
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/nikushasta2026}/hermes:${TAG:-latest}
    container_name: hermes-agent
    restart: unless-stopped
    ports:
      - "${HERMES_PORT:-8081}:8080"
    volumes:
      - hermes-data:/home/hermes/.hermes
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HERMES_MODEL=${HERMES_MODEL:-anthropic:claude-sonnet-4-6}
      - HERMES_PORT=8080
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Twenty CRM — Developer Outreach CRM (port 3200)
  # ---------------------------------------------------------------------------
  twenty-db:
    image: postgres:16-alpine
    container_name: twenty-db
    restart: unless-stopped
    volumes:
      - twenty-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${TWENTY_DB_USER:-twenty}
      - POSTGRES_PASSWORD=${TWENTY_DB_PASSWORD:-twenty}
      - POSTGRES_DB=twenty
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TWENTY_DB_USER:-twenty} -d twenty"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  twenty-redis:
    image: redis:7-alpine
    container_name: twenty-redis
    restart: unless-stopped
    volumes:
      - twenty-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  twenty-crm:
    build:
      context: ./twenty-crm
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/nikushasta2026}/twenty-crm:${TAG:-latest}
    container_name: twenty-crm
    restart: unless-stopped
    ports:
      - "3200:3000"
    volumes:
      - twenty-server-local-data:/app/packages/twenty-server/.local-storage
    environment:
      - PG_DATABASE_URL=postgresql://${TWENTY_DB_USER:-twenty}:${TWENTY_DB_PASSWORD:-twenty}@twenty-db:5432/twenty
      - REDIS_URL=redis://twenty-redis:6379
      - APP_SECRET=${TWENTY_APP_SECRET:-Q8fQC3wm9EIZRrnbtmzminBQ7Uz1n2et}
      - SERVER_URL=${TWENTY_SERVER_URL:-http://77.42.7.12:3200}
      - FRONT_BASE_URL=${TWENTY_SERVER_URL:-http://77.42.7.12:3200}
      - NODE_ENV=production
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/packages/twenty-server/.local-storage
    depends_on:
      twenty-db:
        condition: service_healthy
      twenty-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
