version: '3.9'

# =============================================================================
# Stilgar Infrastructure — Full Stack Docker Compose
# =============================================================================
# Services:
#   - paperclip:    AI Company OS (port 3100)
#   - nanoclaw-ceo: OpenClaw CEO agent node (port 3000)
#   - hermes:       NousResearch Hermes Agent (port 8080)
#
# Managed by Coolify on the Stilgar dedicated server (61GB RAM).
# Note: No custom network defined — Coolify manages its own bridge network.
#
# Usage (standalone):
#   cp .env.example .env && nano .env
#   docker compose up -d
# =============================================================================

volumes:
  paperclip-data:
    name: paperclip-data
  nanoclaw-ceo-data:
    name: nanoclaw-ceo-data
  hermes-data:
    name: hermes-data

services:

  # ---------------------------------------------------------------------------
  # Paperclip — AI Company OS
  # ---------------------------------------------------------------------------
  paperclip:
    build:
      context: ./paperclip
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/nikushasta2026}/paperclip:${TAG:-latest}
    container_name: paperclip
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - paperclip-data:/paperclip
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PAPERCLIP_HOME=/paperclip
      - HOST=0.0.0.0
      - PORT=3100
      - SERVE_UI=true
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3100/api/health || wget -qO- http://localhost:3100/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # NanoClaw CEO — OpenClaw Nanoclaw Node (CEO Persona)
  # ---------------------------------------------------------------------------
  nanoclaw-ceo:
    build:
      context: ./nanoclaw-ceo
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/nikushasta2026}/nanoclaw-ceo:${TAG:-latest}
    container_name: nanoclaw-ceo
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - nanoclaw-ceo-data:/agent/workspace
    environment:
      - OPENCLAW_AGENT_TOKEN=${NANOCLAW_CEO_TOKEN}
      - PAPERCLIP_GATEWAY_URL=http://paperclip:3100
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_BOARD_CHANNEL=${SLACK_BOARD_CHANNEL:-}
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Hermes Agent — NousResearch Hermes (hermes-local adapter testing)
  # ---------------------------------------------------------------------------
  hermes:
    build:
      context: ./hermes
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/nikushasta2026}/hermes:${TAG:-latest}
    container_name: hermes-agent
    restart: unless-stopped
    ports:
      - "${HERMES_PORT:-8080}:8080"
    volumes:
      - hermes-data:/home/hermes/.hermes
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HERMES_MODEL=${HERMES_MODEL:-anthropic:claude-sonnet-4-6}
      - HERMES_PORT=8080
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
