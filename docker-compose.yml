version: '3.9'

# =============================================================================
# Stilgar Infrastructure — Full Stack Docker Compose
# =============================================================================
# Services:
#   - paperclip:       AI Company OS
#   - nanoclaw-ceo:    OpenClaw CEO agent node
#   - hermes:          NousResearch Hermes Agent
#   - twenty-crm:      Twenty CRM — developer outreach CRM
#   - twenty-db:       PostgreSQL for Twenty CRM (internal Twenty data)
#   - twenty-redis:    Redis for Twenty CRM
#   - developers-db:   PostgreSQL — 1,684 luxury RE developers (linked to Twenty via Remote Objects)
#
# Managed by Coolify on the Stilgar dedicated server (61GB RAM).
# Coolify's Traefik proxy handles SSL (Let's Encrypt) and domain routing.
#
# Domain routing (via Coolify/Traefik):
#   crm.shasta-collective.com        → twenty-crm:3000
#   paperclip.shasta-collective.com  → paperclip:3101
#   ceo.shasta-collective.com        → nanoclaw-ceo:3000
#   hermes.shasta-collective.com     → hermes-agent:8080
#
# Note: Caddy image (ghcr.io/nikushasta2026/caddy) is built/available in GHCR
# but not deployed here — Coolify's built-in Traefik handles SSL/routing.
#
# Usage (standalone, no Coolify):
#   cp .env.example .env && nano .env
#   docker compose up -d
# =============================================================================

networks:
  coolify:
    external: true

volumes:
  paperclip-data:
    name: paperclip-data
  nanoclaw-ceo-data:
    name: nanoclaw-ceo-data
  hermes-data:
    name: hermes-data
  twenty-db-data:
    name: twenty-db-data
  twenty-server-local-data:
    name: twenty-server-local-data
  twenty-redis-data:
    name: twenty-redis-data
  developers-db-data:
    name: developers-db-data

services:

  # ---------------------------------------------------------------------------
  # Paperclip — AI Company OS
  # ---------------------------------------------------------------------------
  paperclip:
    build:
      context: ./paperclip
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/nikushasta2026}/paperclip:${TAG:-latest}
    container_name: paperclip
    restart: unless-stopped
    expose:
      - "3101"
    volumes:
      - paperclip-data:/paperclip
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_BASE_URL=${BETTER_AUTH_BASE_URL:-https://paperclip.shasta-collective.com}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PAPERCLIP_HOME=/paperclip
      - HOST=0.0.0.0
      - PORT=3101
      - SERVE_UI=true
      - NODE_ENV=production
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paperclip.rule=Host(`paperclip.shasta-collective.com`)"
      - "traefik.http.routers.paperclip.entrypoints=https"
      - "traefik.http.routers.paperclip.tls=true"
      - "traefik.http.routers.paperclip.tls.certresolver=letsencrypt"
      - "traefik.http.services.paperclip.loadbalancer.server.port=3101"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3101/api/health || wget -qO- http://localhost:3101/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # NanoClaw CEO — OpenClaw Nanoclaw Node (CEO Persona)
  # ---------------------------------------------------------------------------
  nanoclaw-ceo:
    build:
      context: ./nanoclaw-ceo
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/nikushasta2026}/nanoclaw-ceo:${TAG:-latest}
    container_name: nanoclaw-ceo
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - nanoclaw-ceo-data:/agent/workspace
    environment:
      - OPENCLAW_AGENT_TOKEN=${NANOCLAW_CEO_TOKEN}
      - PAPERCLIP_GATEWAY_URL=http://paperclip:3101
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_BOARD_CHANNEL=${SLACK_BOARD_CHANNEL:-}
      - NODE_ENV=production
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nanoclaw-ceo.rule=Host(`ceo.shasta-collective.com`)"
      - "traefik.http.routers.nanoclaw-ceo.entrypoints=https"
      - "traefik.http.routers.nanoclaw-ceo.tls=true"
      - "traefik.http.routers.nanoclaw-ceo.tls.certresolver=letsencrypt"
      - "traefik.http.services.nanoclaw-ceo.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Hermes Agent — NousResearch Hermes (hermes-local adapter testing)
  # ---------------------------------------------------------------------------
  hermes:
    build:
      context: ./hermes
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/nikushasta2026}/hermes:${TAG:-latest}
    container_name: hermes-agent
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - hermes-data:/home/hermes/.hermes
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HERMES_MODEL=${HERMES_MODEL:-anthropic:claude-sonnet-4-6}
      - HERMES_PORT=8080
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermes.rule=Host(`hermes.shasta-collective.com`)"
      - "traefik.http.routers.hermes.entrypoints=https"
      - "traefik.http.routers.hermes.tls=true"
      - "traefik.http.routers.hermes.tls.certresolver=letsencrypt"
      - "traefik.http.services.hermes.loadbalancer.server.port=8080"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Twenty CRM — Developer Outreach CRM
  # ---------------------------------------------------------------------------
  twenty-db:
    image: postgres:16-alpine
    container_name: twenty-db
    restart: unless-stopped
    volumes:
      - twenty-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${TWENTY_DB_USER:-twenty}
      - POSTGRES_PASSWORD=${TWENTY_DB_PASSWORD:-twenty}
      - POSTGRES_DB=twenty
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TWENTY_DB_USER:-twenty} -d twenty"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  twenty-redis:
    image: redis:7-alpine
    container_name: twenty-redis
    restart: unless-stopped
    volumes:
      - twenty-redis-data:/data
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Developers DB — Persistent PostgreSQL with 1,684 luxury RE developers
  # Linked to Twenty CRM via Remote Objects (postgres_fdw)
  # ---------------------------------------------------------------------------
  developers-db:
    build:
      context: ./developers-db
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/nikushasta2026}/developers-db:${TAG:-latest}
    container_name: developers-db
    restart: unless-stopped
    volumes:
      - developers-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DEVELOPERS_DB_USER:-developers}
      - POSTGRES_PASSWORD=${DEVELOPERS_DB_PASSWORD:-developers}
      - POSTGRES_DB=developers
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEVELOPERS_DB_USER:-developers} -d developers"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  twenty-crm:
    build:
      context: ./twenty-crm
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/nikushasta2026}/twenty-crm:${TAG:-latest}
    container_name: twenty-crm
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - twenty-server-local-data:/app/packages/twenty-server/.local-storage
    environment:
      - PG_DATABASE_URL=postgresql://${TWENTY_DB_USER:-twenty}:${TWENTY_DB_PASSWORD:-twenty}@twenty-db:5432/twenty
      - REDIS_URL=redis://twenty-redis:6379
      - APP_SECRET=${TWENTY_APP_SECRET:-Q8fQC3wm9EIZRrnbtmzminBQ7Uz1n2et}
      - SERVER_URL=${TWENTY_SERVER_URL:-https://crm.shasta-collective.com}
      - FRONT_BASE_URL=${TWENTY_SERVER_URL:-https://crm.shasta-collective.com}
      - NODE_ENV=production
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/packages/twenty-server/.local-storage
      # Remote Objects — developers database (linked via postgres_fdw in Twenty)
      - PG_DATABASE_URL_METADATA=postgresql://${DEVELOPERS_DB_USER:-developers}:${DEVELOPERS_DB_PASSWORD:-developers}@developers-db:5432/developers
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.twenty-crm.rule=Host(`crm.shasta-collective.com`)"
      - "traefik.http.routers.twenty-crm.entrypoints=https"
      - "traefik.http.routers.twenty-crm.tls=true"
      - "traefik.http.routers.twenty-crm.tls.certresolver=letsencrypt"
      - "traefik.http.services.twenty-crm.loadbalancer.server.port=3000"
    depends_on:
      twenty-db:
        condition: service_healthy
      twenty-redis:
        condition: service_healthy
      developers-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
