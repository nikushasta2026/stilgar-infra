version: '3.9'

# =============================================================================
# Stilgar Infrastructure — Full Stack Docker Compose
# =============================================================================
# Services:
#   - paperclip:    AI Company OS (port 3100)
#   - nanoclaw-ceo: OpenClaw CEO agent node (port 3000)
#   - hermes:       NousResearch Hermes Agent (port 8080)
#
# All services share the paperclip-net network.
# Managed by Coolify on the Stilgar dedicated server (61GB RAM).
#
# Usage:
#   cp .env.example .env && nano .env
#   docker compose up -d
# =============================================================================

networks:
  paperclip-net:
    name: paperclip-net
    driver: bridge

volumes:
  paperclip-data:
    name: paperclip-data
  nanoclaw-ceo-data:
    name: nanoclaw-ceo-data
  hermes-data:
    name: hermes-data

services:

  # ---------------------------------------------------------------------------
  # Paperclip — AI Company OS
  # ---------------------------------------------------------------------------
  paperclip:
    build:
      context: ./paperclip
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/nikushasta2026}/paperclip:${TAG:-latest}
    container_name: paperclip
    restart: unless-stopped
    networks:
      - paperclip-net
    ports:
      - "3100:3100"
    volumes:
      - paperclip-data:/data/paperclip
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=file:/data/paperclip/db.sqlite
      - NEXT_PUBLIC_APP_URL=${PAPERCLIP_URL:-http://localhost:3100}
      - PAPERCLIP_GATEWAY_URL=${PAPERCLIP_GATEWAY_URL:-http://paperclip:3100}
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # NanoClaw CEO — OpenClaw Nanoclaw Node (CEO Persona)
  # ---------------------------------------------------------------------------
  nanoclaw-ceo:
    build:
      context: ./nanoclaw-ceo
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/nikushasta2026}/nanoclaw-ceo:${TAG:-latest}
    container_name: nanoclaw-ceo
    restart: unless-stopped
    networks:
      - paperclip-net
    ports:
      - "3000:3000"
    volumes:
      - nanoclaw-ceo-data:/agent/workspace
    environment:
      - OPENCLAW_AGENT_TOKEN=${NANOCLAW_CEO_TOKEN}
      - PAPERCLIP_GATEWAY_URL=http://paperclip:3100
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_BOARD_CHANNEL=${SLACK_BOARD_CHANNEL:-}
      - NODE_ENV=production
    depends_on:
      paperclip:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Hermes Agent — NousResearch Hermes (hermes-local adapter testing)
  # ---------------------------------------------------------------------------
  hermes:
    build:
      context: ./hermes
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/nikushasta2026}/hermes:${TAG:-latest}
    container_name: hermes-agent
    restart: unless-stopped
    networks:
      - paperclip-net
    ports:
      - "${HERMES_PORT:-8080}:8080"
    volumes:
      - hermes-data:/home/hermes/.hermes
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HERMES_MODEL=${HERMES_MODEL:-anthropic:claude-sonnet-4-6}
      - HERMES_PORT=8080
      # Uncomment to use OpenRouter instead:
      # - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
