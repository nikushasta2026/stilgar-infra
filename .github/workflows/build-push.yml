name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/nikushasta2026

jobs:
  build-paperclip:
    name: Build paperclip
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./paperclip
          push: true
          tags: |
            ghcr.io/nikushasta2026/paperclip:latest
            ghcr.io/nikushasta2026/paperclip:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

